<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flashcard Revision | Ravi's Knowledge Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Montserrat:wght@600;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: linear-gradient(135deg, #f8ffae 0%, #43c6ac 100%); }
    .flashcard-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90vh; }
    .flashcard { background: #fff; border-radius: 18px; box-shadow: 0 8px 32px #43c6ac33; padding: 2.2rem 1.5rem; max-width: 420px; min-height: 180px; text-align: center; font-size: 1.2rem; font-family: 'Space Grotesk', Arial, sans-serif; margin-bottom: 1.5rem; transition: box-shadow 0.2s, transform 0.2s; }
    .flashcard strong { color: #ea4aaa; }
    .flashcard-btns { display: flex; gap: 1.2rem; justify-content: center; margin-top: 1.2rem; }
    .fc-btn { padding: 0.7rem 2.2rem; font-size: 1.1rem; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s, transform 0.2s; }
    .fc-btn.know { background: #5ba4f5; color: #fff; }
    .fc-btn.review { background: #ea4aaa; color: #fff; }
    .fc-btn:hover { transform: translateY(-2px) scale(1.04); }
    .fc-progress { margin-bottom: 1.2rem; color: #1a1a2e; font-weight: 600; }
    .fc-viewall { margin: 1.5rem 0 0.5rem; text-align: center; }
    .fc-list { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px #43c6ac22; padding: 1.2rem 1rem; max-width: 500px; margin: 0 auto; }
    .fc-list li { margin-bottom: 0.7em; font-size: 1.05rem; color: #222; line-height: 1.6; }
    .fc-list strong { color: #ea4aaa; }
    .fc-back { margin-top: 2rem; display: inline-block; color: #5ba4f5; font-weight: 700; text-decoration: underline; cursor: pointer; }
  </style>
</head>
<body>
  <div class="flashcard-container">
    <div class="fc-progress" id="fc-progress"></div>
    <div class="flashcard" id="flashcard"></div>
    <div class="flashcard-btns">
      <button class="fc-btn know" onclick="nextCard('know')">Know it 👍</button>
      <button class="fc-btn review" onclick="nextCard('review')">Review again 👈</button>
    </div>
    <div class="fc-viewall">
      <button class="btn" onclick="toggleList()">View All as List</button>
    </div>
    <ul class="fc-list" id="fc-list" style="display:none;"></ul>
    <a class="fc-back" href="index.html">← Back to Home</a>
  </div>
  <script>
    // 100+ flashcards auto-generated from blog post topics
    const flashcards = [
      // JavaScript Cheatsheet (1-39)
      { front: '<strong>JS Variables: var, let & const</strong>', back: 'Understand scoping rules and when to pick var, let, or const.' },
      { front: '<strong>JS Primitive Data Types</strong>', back: 'The 7 primitive types: string, number, boolean, null, undefined, symbol, BigInt.' },
      { front: '<strong>JS Non-Primitive Types</strong>', back: 'Everything that isn\'t a primitive is an object — including arrays and functions.' },
      { front: '<strong>JS Type Checking</strong>', back: 'Use typeof for primitives and Array.isArray for arrays.' },
      { front: '<strong>JS Arithmetic Operators</strong>', back: 'Addition, subtraction, multiplication, division, modulus, exponent, increment, decrement.' },
      { front: '<strong>JS Assignment Operators</strong>', back: 'Shorthand operators: +=, -=, *=, /=, %= for concise variable updates.' },
      { front: '<strong>JS Comparison: == vs ===</strong>', back: 'Always prefer strict equality (===) to avoid type coercion surprises.' },
      { front: '<strong>JS Logical Operators & Nullish Coalescing</strong>', back: 'AND (&&), OR (||), NOT (!), and the modern ?? operator.' },
      { front: '<strong>JS If / Else Control Flow</strong>', back: 'Branch execution based on conditions with if, else if, and else.' },
      { front: '<strong>JS Ternary Operator</strong>', back: 'One-line conditionals: condition ? valueIfTrue : valueIfFalse.' },
      { front: '<strong>JS Switch Statement</strong>', back: 'Multi-branch selection with switch/case for cleaner value matching.' },
      { front: '<strong>JS For Loop</strong>', back: 'The classic counted loop: initialize, condition, increment.' },
      { front: '<strong>JS While & Do...While Loops</strong>', back: 'While checks before running; do...while runs at least once.' },
      { front: '<strong>JS for...of & for...in Iterators</strong>', back: 'for...of iterates values (arrays/strings); for...in iterates keys (objects).' },
      { front: '<strong>JS Function Declarations</strong>', back: 'Function declarations are hoisted — you can call them before they\'re defined.' },
      { front: '<strong>JS Function Expressions</strong>', back: 'Assign a function to a variable — not hoisted, evaluated at runtime.' },
      { front: '<strong>JS Arrow Functions</strong>', back: 'Concise syntax with => and lexical this binding.' },
      { front: '<strong>JS Default & Rest Parameters</strong>', back: 'Set fallback values with defaults; collect unlimited args with rest.' },
      { front: '<strong>JS Objects & the this Keyword</strong>', back: 'Object literals, methods, and how this works in different contexts.' },
      { front: '<strong>JS Array Mutation: push, pop, shift, splice</strong>', back: 'Methods that modify the original array in place.' },
      { front: '<strong>JS Array .map()</strong>', back: 'Create a new array by transforming each element. Never mutates original.' },
      { front: '<strong>JS Array .filter()</strong>', back: 'Return a new array containing only elements that pass the test.' },
      { front: '<strong>JS Array .reduce()</strong>', back: 'Reduce an array down to one value — sum, object, or anything.' },
      { front: '<strong>JS .forEach(), .some(), .every()</strong>', back: 'forEach for side effects, some/every for boolean checks on arrays.' },
      { front: '<strong>JS Destructuring: Arrays & Objects</strong>', back: 'Extract values from arrays/objects into variables in one statement.' },
      { front: '<strong>JS Spread Operator (...)</strong>', back: 'Expand arrays/objects. Clone, merge, and compose without mutation.' },
      { front: '<strong>JS DOM Manipulation</strong>', back: 'Select elements, modify text/styles, and create dynamic content.' },
      { front: '<strong>JS Event Handling</strong>', back: 'Listen for user interactions with addEventListener.' },
      { front: '<strong>JS JSON: stringify & parse</strong>', back: 'Convert between objects and JSON strings for storage and APIs.' },
      { front: '<strong>JS Promises</strong>', back: 'Handle asynchronous operations with resolve, reject, and .then() chains.' },
      { front: '<strong>JS Async / Await</strong>', back: 'Write asynchronous code that reads like synchronous code.' },
      { front: '<strong>JS Modules: import & export</strong>', back: 'Organize code into reusable files with ES module syntax.' },
      { front: '<strong>JS Error Handling: try / catch / finally</strong>', back: 'Gracefully handle runtime errors without crashing your application.' },
      { front: '<strong>JS OOP: Classes & Inheritance</strong>', back: 'Class syntax for constructors, methods, and extends-based inheritance.' },
      { front: '<strong>JS Set — Unique Value Collection</strong>', back: 'Store unique values and perform set operations efficiently.' },
      { front: '<strong>JS Map — Key-Value Collection</strong>', back: 'Maps accept any key type and maintain insertion order.' },
      { front: '<strong>JS Built-in String Methods</strong>', back: 'Essential string operations: case, search, slice, split, replace, trim.' },
      { front: '<strong>JS Built-in Math & Number Methods</strong>', back: 'Math for calculations; Number for parsing and validation.' },
      { front: '<strong>JS Optional Chaining & Modern Shortcuts</strong>', back: 'Safe property access with ?. and concise patterns for everyday code.' },
      // Playwright Interview & Deep Dive (40-65)
      { front: '<strong>What is Playwright & Key Features</strong>', back: 'Open-source E2E framework by Microsoft with cross-browser, auto-wait, and parallel execution.' },
      { front: '<strong>Playwright vs Selenium: Architecture Differences</strong>', back: 'Direct protocol control vs WebDriver — why Playwright is faster and more reliable.' },
      { front: '<strong>Playwright Auto-Waiting Mechanism</strong>', back: 'Before every action, Playwright ensures the element is ready — no manual waits needed.' },
      { front: '<strong>Browser Contexts: Isolated Sessions</strong>', back: 'Incognito-like sessions within a single browser. Parallel tests without interference.' },
      { front: '<strong>Handling Multiple Pages & Frames</strong>', back: 'Work with new tabs, popups, and iframes using Playwright\'s page and frame APIs.' },
      { front: '<strong>Playwright Locators & Best Practices</strong>', back: 'Locators are lazy, auto-retrying queries. Use user-facing attributes first.' },
      { front: '<strong>API Testing with Playwright</strong>', back: 'Make HTTP requests, validate responses, and combine UI + API testing.' },
      { front: '<strong>Playwright Test Runner & Fixtures</strong>', back: 'Built-in fixtures for browser, context, page. Parallel by default with full lifecycle hooks.' },
      { front: '<strong>Authentication Strategies in Playwright</strong>', back: 'Log in once, save state, reuse everywhere. Avoid re-logging in every test.' },
      { front: '<strong>Playwright Debugging: Inspector, UI Mode, Traces</strong>', back: 'A complete debugging stack from local development to CI failure forensics.' },
      { front: '<strong>Playwright Internal Architecture</strong>', back: 'Direct browser protocol communication — no WebDriver, no middleware.' },
      { front: '<strong>Web-First Assertions in Playwright</strong>', back: 'Auto-retrying assertions that wait for conditions to be met, reducing flakiness.' },
      { front: '<strong>Playwright Retries & Flaky Test Handling</strong>', back: 'Configure retries as a safety net, not as a fix for broken tests.' },
      { front: '<strong>Playwright CI Setup & Best Practices</strong>', back: 'Reliable CI configuration: install, run, report, and artifact collection.' },
      { front: '<strong>Cross-Browser Testing Strategy</strong>', back: 'Configure multi-browser projects for Chromium, Firefox, and WebKit.' },
      { front: '<strong>Test Isolation & Hook Design</strong>', back: 'Each test gets a fresh context. Use hooks for setup, not shared state.' },
      { front: '<strong>Playwright Sharding & Report Merging</strong>', back: 'Split test suites across CI machines and merge results into one report.' },
      { front: '<strong>Playwright Trace Viewer Deep Dive</strong>', back: 'Time-travel debugging with DOM snapshots, network logs, and action timeline.' },
      { front: '<strong>Network Interception & Mocking</strong>', back: 'Intercept, modify, or mock API responses for controlled testing.' },
      { front: '<strong>Page Object Model in Playwright</strong>', back: 'Encapsulate page interactions in classes for maintainable, reusable test code.' },
      { front: '<strong>Visual Regression Testing with Playwright</strong>', back: 'Screenshot comparison to catch unintended visual changes.' },
      { front: '<strong>Playwright Code Generation (codegen)</strong>', back: 'Record browser actions and generate test code automatically.' },
      { front: '<strong>Playwright Configuration Deep Dive</strong>', back: 'Master playwright.config.ts: projects, timeouts, retries, reporters, and use options.' },
      { front: '<strong>Handling Dialogs, Downloads & Uploads</strong>', back: 'Handle browser dialogs, file downloads, and file upload inputs.' },
      { front: '<strong>Data-Driven Testing in Playwright</strong>', back: 'Run the same test with multiple datasets using loops or test.describe.' },
      { front: '<strong>JavaScript vs TypeScript for Playwright Projects</strong>', back: 'TypeScript is recommended for safety, but JavaScript works for quick prototypes.' },
      // MCP (Model Context Protocol) (66-100)
      { front: '<strong>What is MCP (Model Context Protocol)?</strong>', back: 'MCP is NOT a test framework — it\'s a protocol standardizing how AI models, tools, and context communicate.' },
      { front: '<strong>Why MCP Was Introduced</strong>', back: 'Prompt-only AI suffers from statelessness, hallucinations, and no execution feedback. MCP fixes this.' },
      { front: '<strong>MCP vs Prompt-Only AI Testing</strong>', back: 'MCP adds structured actions, real feedback, and governed execution on top of AI capabilities.' },
      { front: '<strong>MCP Servers in Testing</strong>', back: 'An MCP server exposes Playwright capabilities as tools and streams DOM, screenshots, and logs.' },
      { front: '<strong>Why a Code Agent is Required for MCP</strong>', back: 'MCP doesn\'t think — the AI agent interprets intent, plans steps, and decides recovery.' },
      { front: '<strong>MCP Security & Governance Basics</strong>', back: 'Enterprise MCP requires read-only DOM access, PII masking, prompt logging, and approval workflows.' },
      { front: '<strong>Playwright MCP Architecture</strong>', back: 'User Intent → AI Agent → MCP Protocol → MCP Server → Playwright → Browser.' },
      { front: '<strong>MCP Planner Agent: Intent Classification</strong>', back: 'The Planner classifies user intent into navigation, authentication, validation, workflow, and constraint types.' },
      { front: '<strong>MCP Planner: State Gap Analysis</strong>', back: 'The Planner compares current browser state to desired state and determines prerequisite steps.' },
      { front: '<strong>MCP Planner: Risk Annotation</strong>', back: 'Each planned step is tagged with risk levels: locator volatility, network dependency, auth failure.' },
      { front: '<strong>MCP Generator Agent: Plan to Playwright Code</strong>', back: 'Converts the Planner\'s execution graph into deterministic Playwright primitives.' },
      { front: '<strong>MCP Generator: TypeScript vs JavaScript</strong>', back: 'MCP performs better with TypeScript — AST reasoning, safer healing, stronger boundaries.' },
      { front: '<strong>MCP Healer Agent: Failure Recovery</strong>', back: 'The Healer is reactive — it activates after a failure and attempts recovery without changing test intent.' },
      { front: '<strong>MCP Execution Traces & Observability</strong>', back: 'Every MCP execution must produce: prompt, plan, code, screenshots, traces, and healing diffs.' },
      { front: '<strong>Enterprise SSO/Auth Testing with MCP</strong>', back: 'MCP handles external auth dependencies, redirect flows, and role validation automatically.' },
      { front: '<strong>Role-Based UI Validation with MCP</strong>', back: 'Assert on absence, not just presence. Verify users DON\'T see what they shouldn\'t.' },
      { front: '<strong>MCP Anti-Flakiness Strategy</strong>', back: 'MCP replaces arbitrary waits with network-idle conditions, UI readiness signals, and state assertions.' },
      { front: '<strong>Why Traditional Automation Hits Its Limits</strong>', back: '60-70% of automation effort goes into maintenance. MCP targets this translation cost.' },
      { front: '<strong>Governance, Risk & Compliance for MCP</strong>', back: 'MCP without governance becomes unreviewable automation. Guardrails are mandatory.' },
      { front: '<strong>CI/CD Governance Model for MCP</strong>', back: 'MCP in CI/CD needs explicit execution modes: Validation, Exploratory, and Adaptive.' },
      { front: '<strong>MCP Pipeline Stages in Detail</strong>', back: 'Four stages: Prompt Validation → Plan Diffing → Deterministic Execution → Adaptive Execution.' },
      { front: '<strong>Prompt Review & Versioning Workflow</strong>', back: 'MCP prompts define behavior, scope, and risk. They require formal review like code.' },
      { front: '<strong>Leadership Adoption Playbook for MCP</strong>', back: 'MCP is a test intelligence layer, not a cost-cutting shortcut. Adopt in 3 phases.' },
      { front: '<strong>KPIs Leadership Should Track for MCP</strong>', back: 'Track maintenance reduction, flakiness rate, time-to-test. Avoid raw test count and AI-generated %.' },
      { front: '<strong>RACI Model for MCP Ownership</strong>', back: 'MCP agents are responsible for actions, never accountable for outcomes. Humans own decisions.' },
      { front: '<strong>Regulated Industry MCP: SOC2 / ISO 27001</strong>', back: 'SOC2 requires prompt versioning, plan retention, and healing logs. ISO requires least-privilege and separation.' },
      { front: '<strong>HIPAA-Compatible MCP Testing</strong>', back: 'MCP must never infer or generate PHI values. DOM masking and screenshot redaction are mandatory.' },
      { front: '<strong>MCP Compliance Artifact Set</strong>', back: 'Five mandatory artifacts: prompt history, plan diffs, healing rationale, execution traces, approval records.' },
      { front: '<strong>MCP ROI Narrative for Leadership</strong>', back: 'MCP reduces waste by eliminating translation and maintenance cost — not by replacing people.' },
      { front: '<strong>Why MCP Fails at Leadership Level</strong>', back: 'MCP fails when leaders treat it as a tooling upgrade, skip governance, or chase speed over correctness.' },
      { front: '<strong>Full MCP Operating Model: People + Process + Tech</strong>', back: 'Align roles, processes, and technology to implement MCP safely and at scale.' },
      { front: '<strong>MCP Misuse Case Study: What Went Wrong</strong>', back: 'A global enterprise rolled out MCP in 3 weeks without governance — here\'s what happened.' },
      { front: '<strong>MCP Corrective Measures & Recovery</strong>', back: 'After MCP misuse: establish review boards, disable PR healing, retain artifacts, fix KPIs.' },
      { front: '<strong>MCP Environment Setup: Step by Step</strong>', back: 'Node 18+, Playwright, MCP server installation, and project folder structure.' },
      { front: '<strong>Playwright + MCP: The Complete Mental Model</strong>', back: 'The full picture: Playwright provides deterministic execution; MCP provides intelligent orchestration.' }
    ];
    let idx = 0, known = 0, review = 0;
    function showCard() {
      document.getElementById('flashcard').innerHTML = `${flashcards[idx].front}<br><span style="color:#444;font-size:1rem;">${flashcards[idx].back}</span>`;
      document.getElementById('fc-progress').textContent = `Card ${idx+1} of ${flashcards.length}`;
    }
    function nextCard(type) {
      if(type==='know') known++; else review++;
      idx = (idx+1)%flashcards.length;
      showCard();
    }
    function toggleList() {
      const ul = document.getElementById('fc-list');
      if(ul.style.display==='none') {
        ul.innerHTML = flashcards.map(f=>`<li>${f.front}: <span style='color:#444;'>${f.back}</span></li>`).join('');
        ul.style.display='block';
      } else {
        ul.style.display='none';
      }
    }
    showCard();
  </script>
</body>
</html>
